# DigitalOcean App Platform spec — Research Agent (UI + Python agent)
#
# Cost: one shared-CPU service at apps-s-1vcpu-0.5gb ≈ US$5/month (same tier as ralphlavelle-net).
# The Angular UI and Python scheduler run in ONE container so they share /app/data at runtime.
#
# Data folder note:
#   - At runtime, reports / xlsx / events.json / images all live under /app/data/<topic>/.
#   - App Platform disk is EPHEMERAL (wiped on redeploy). Fine for short-term use; for long-term
#     persistence add DigitalOcean Spaces and point the agent at object storage later.
#
# Before first deploy:
#   1. Push this repo to GitHub (RalphLavelle/ResearchAgent).
#   2. In the DO control panel (or via MCP), set secret env vars: OLLAMA_API_KEY, etc.
#   3. Create the app from this spec, or run: doctl apps create --spec .do/app.yaml
#
# Optional: copy local data/ into the running container once for a warm start (see deploy notes in task 2).

name: research-agent
region: syd

services:
  - name: web-and-agent
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: RalphLavelle/ResearchAgent
      branch: master
      deploy_on_push: true
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: DATA_DIR
        value: /app/data
        scope: RUN_TIME
      - key: ACTIVE_TOPIC
        value: live-music-brisbane-gold-coast
        scope: RUN_TIME
      - key: OLLAMA_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: OPENAI_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/v1
        scope: RUN_TIME
      - key: OLLAMA_MODEL
        value: gpt-oss:120b-cloud
        scope: RUN_TIME
      - key: NOTION_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: OLLAMA_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NOTION_INTEGRATION_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: NOTION_RESEARCH_PAGE_ID
        scope: RUN_TIME
        type: SECRET

ingress:
  rules:
    - component:
        name: web-and-agent
      match:
        path:
          prefix: /

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22
