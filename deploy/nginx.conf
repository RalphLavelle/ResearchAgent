# Serves the Angular SPA and runtime data written by the research agent.
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;
        root /app/web;
        index index.html;

        # Optional local snapshot fingerprint (events/reports/images are in MongoDB).
        location /data/ {
            alias /app/data/;
            add_header Cache-Control "no-cache";
        }

        # MongoDB-backed REST API (Python uvicorn).
        location /api/ {
            proxy_pass http://127.0.0.1:8765;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SEO files are generated by the API (sitemap reflects live tag/venue
        # pages; both use the request Host so no domain is hard-coded).
        location = /robots.txt {
            proxy_pass http://127.0.0.1:8765;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location = /sitemap.xml {
            proxy_pass http://127.0.0.1:8765;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Topic registry + YAML (also baked into the Angular build).
        location /topics/ {
            alias /app/topics/;
            add_header Cache-Control "public, max-age=300";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
