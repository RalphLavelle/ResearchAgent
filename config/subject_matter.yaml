# Subject-matter configuration for the research pipeline.
#
# This file tells the agent WHAT to research and HOW to describe it.
# The Python code (the "engine") reads this file at startup and stays
# completely ignorant of the topic — swap this file (or point
# SUBJECT_MATTER_CONFIG in your .env to a different YAML) to change
# the entire research focus without touching any Python.
#
# All multi-line text uses the YAML literal-block style (lines starting
# with |) so that line breaks are preserved exactly as written.

# Short human-readable label used in log messages.
topic: "Live Music Events - Gold Coast & Brisbane"

# Heading and intro text written at the top of the output Markdown file.
output_title: "Upcoming Live Music Events"
output_description: >
  (Documentation only.) One row per gig. Spreadsheet columns: Event, Venue,
  Location, Date, URL, Poster URL, Summary, Added. Titles must use
  "Act @ Venue, Location" when all three are known so the app can split them
  into separate columns.

# ── LLM PROMPTS ───────────────────────────────────────────────────────────────
# These are sent to the LLM as instructions. Edit freely to tune behaviour.

# System prompt for the PLANNER step — tells the LLM what kinds of
# search queries to produce.
planner_system_prompt: |
  You plan web search queries to find specific upcoming live music gigs
  and concerts in the Gold Coast and Brisbane areas of Queensland, Australia.
  Prefer queries that surface ticketing pages (Ticketek, Moshtix, Oztix, Eventbrite),
  venue "what's on" **event-detail** pages (HOTA, Fortitude Music Hall, Triffid,
  The Tivoli, HSW, Miami Marketta, Burleigh Bazaar, Coolangatta Hotel, Star Gold Coast),
  Facebook event URLs, Bandsintown/Songkick city pages, and local gig guides
  (Scene, The Music, street press). Rotate query angles: upcoming, "tickets",
  festivals, open mic, jazz/blues rooms, pub residencies. Avoid queries that only return generic portal homepages with no dates. Output as many distinct queries as requested (up to the limit in the user message).
  Each query should be short and specific.



# The human-turn message sent alongside the planner system prompt.
# (The engine appends today's UTC date and a strict 30-day window.)
planner_user_message: |
  Plan search queries to find individual upcoming live music events on the
  Gold Coast and Brisbane — rock, pop, classical, folk, and world music.
  Include open mic nights and jam-style listings alongside regular gigs. Include all genres of music. Each query should help find pages for specific dated shows, not generic portal indexes.
  Aim for maximum coverage: different venues, ticket vendors, and genres so the combined search results surface as many separate gigs as possible.

# System prompt for the CURATOR/NORMALISER step — tells the LLM how to
# filter and structure the raw search results into usable records.
# (The engine prepends today's UTC date and the same 30-day window.)
curator_system_prompt: |
  You turn noisy search results into a list of individual upcoming live music
  events (one row per gig) for the Gold Coast and Brisbane areas of Queensland.

  Recall is critical: extract every distinct gig you can justify from the
  snippets and titles across ALL search results — not only the first few hits.
  Treat **calendar and listing HTML** inside "Same-site crawl" as exhaustive:
  enumerate **every** separate musical concert or gig dated in the window (read
  the full block; gigs lower on long pages matter). Prefer the **direct event URL**
  for each line item when anchors point to `/e/`... or `/events/`... paths; reuse
  the listing URL **only when** only one generic URL ties to that row in the excerpt.
  The same venue page may describe many shows — output **many** rows, not one.
  Prefer rows backed by a concrete event or ticket URL even if the snippet is short.
  Do not merge two different acts into one row.

  Rules:
  - Each resource is exactly ONE gig — not a vague portal row with **no named act
    + date**. If multiple independent dated shows appear on one index page,
    emit one resource per distinct show line.
  - title: use "Act @ Venue, Location" whenever known (e.g. "The Beths @ The Tivoli, Brisbane") — the app splits this into three separate columns (Event, Venue, Location). Use a comma after the venue name to separate it from the suburb/city. If the location is unknown, "Act @ Venue" is fine. If only the act is known, just the act name.
  - date: REQUIRED — primary show date only, as ISO YYYY-MM-DD (UTC calendar
    day of the performance). If a range is shown, use the first performance day.
    Rows without a confident ISO date in the allowed window must be omitted.
  - summary: one short sentence (optional line-up or genre hint).
  - url: use the clearest stable link for **that gig** (`/e/`, ticket,
    venue detail, Facebook events). Listing or calendar URLs are OK when nothing
    more specific appears for that named show in the excerpt — downstream merge
    can still reconcile duplicates.
  - thumbnail_url: the same-site crawl text contains inline image markers in
    the form `[IMG alt="<alt-text>" src=<https://…>]`. For each event, choose
    the image whose alt text or surrounding copy most clearly matches **that
    specific event** (act name, support act, poster keywords) and copy its
    src into thumbnail_url. **Never reuse the same image URL across multiple
    events that share a listing URL** — distinct gigs deserve distinct posters.
    If no event-specific marker is present (or every nearby marker is a
    generic banner with no act-specific alt text), leave thumbnail_url blank
    and the engine will fall back to the page's og:image.
  - Omit school and/or children's events, bingo, drag stuff, stand up, comedy, mediums, psychics
  - Omit any event whose date is before "today" or after the allowed window
    described in the user message above the search results.
