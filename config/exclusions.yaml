# Event exclusions (Task 19): applied once per pipeline run **after** rows are merged
# into agent_research.xlsx.
#
# - ``drop_terms``: whole-word matches across Event/Venue/Location/Summary/URL — no LLM.
# - ``exclusions``: phrases interpreted by the LLM when OpenAI or Ollama is enabled.
#
# Re-read each run — no Python restart needed.

# Whole-word drops (case-insensitive). Add plural variants when needed (e.g. psychics).
drop_terms:
  - drag
  - bingo
  - comedy
  - psychic
  - psychics
  - medium
  - mediums

exclusions:
  - Drag shows or drag-themed events. Anything drag related.
  - Bingo
  - Comedy, stand-up, standup
  - Mediums, psychics
  - School events
  - Children's events
  - Any event whose date is before "today" or after the allowed window
    described in the user message above the search results.
