# Copy to schedule.yaml and edit. The serve process reloads this file without restart.
#
# Interval rules:
#   - If interval_minutes is greater than 0, it takes priority and the agent
#     runs that often (interval_hours is ignored).
#   - If interval_minutes is 0 (or absent), interval_hours is used instead.
#
# Examples:
#   interval_hours: 1,  interval_minutes: 0  → runs every 1 hour
#   interval_hours: 12, interval_minutes: 5  → runs every 5 minutes
interval_hours: 3
interval_minutes: 15
