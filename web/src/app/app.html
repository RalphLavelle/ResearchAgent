<a class="skip-link" href="#main-content">Skip to main content</a>

<div class="page-wrap">
  <main id="main-content" class="shell" tabindex="-1">
    <header class="masthead">
      <div class="masthead-top">
        <div class="masthead-titles">
          <a
            routerLink="/"
            class="site-brand"
            routerLinkActive="site-brand--active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <img
              class="site-brand__logotype"
              ngSrc="/logotype.webp"
              alt="Gigsorooni"
              width="316"
              height="143"
              priority
            />
          </a>
        </div>

        <nav class="site-nav site-nav--desktop" aria-label="Primary navigation">
          <a routerLink="/admin" class="nav-link" routerLinkActive="nav-link--active">Admin</a>
          <a routerLink="/about" class="nav-link" routerLinkActive="nav-link--active">About</a>
        </nav>

        <button
          #menuButton
          type="button"
          class="menu-toggle"
          (click)="toggleNav()"
          [attr.aria-expanded]="navOpen()"
          aria-controls="mobile-nav-panel"
          aria-label="Open navigation menu"
        >
          <span class="menu-toggle__box" aria-hidden="true">
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
          </span>
        </button>
      </div>
    </header>

    @if (navOpen()) {
      <div class="nav-backdrop" (click)="closeNav()" aria-hidden="true"></div>
    }

    <nav
      id="mobile-nav-panel"
      class="mobile-nav-drawer"
      [class.mobile-nav-drawer--open]="navOpen()"
      [attr.aria-hidden]="navOpen() ? null : 'true'"
      [attr.inert]="!navOpen() ? '' : null"
      aria-label="Mobile navigation"
    >
      <a
        #firstMobileLink
        routerLink="/admin"
        class="mobile-nav-drawer__link"
        routerLinkActive="mobile-nav-drawer__link--active"
        (click)="closeNav()"
        >Admin</a>
      <a
        routerLink="/about"
        class="mobile-nav-drawer__link"
        routerLinkActive="mobile-nav-drawer__link--active"
        (click)="closeNav()"
        >About</a>
    </nav>

    <router-outlet />
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <button type="button" class="footer-comment-btn" (click)="openCommentModal()">
        Leave a comment or suggestion 💬
      </button>
      <span class="site-footer__sep" aria-hidden="true">|</span>
      <a
        href="mailto:ralph@ralphlavelle.net?subject=Gigsorooni"
        class="site-footer__email"
        aria-label="Email Ralph Lavelle about Gigsorooni"
      >
        📧
      </a>
    </div>
  </footer>
</div>

@if (commentOpen()) {
  <app-comment-modal [db]="topic.active().db" (closed)="closeCommentModal()" />
}
